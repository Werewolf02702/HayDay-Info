<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HayDay Wiki - Cloud Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f1f5f9; 
            -webkit-tap-highlight-color: transparent;
        }
        .card-gradient { background: white; transition: transform 0.2s; }
        .card-gradient:active { transform: scale(0.98); }
        .slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp {
            from { transform: translateY(15px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body class="pb-24 md:pb-8 p-4 md:p-8">

    <div id="app" class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold text-slate-900">🎮 HayDay Wiki</h1>
                <div id="sync-status" class="text-[10px] font-bold mt-1 text-orange-600 bg-orange-50 px-2 py-1 rounded-full inline-flex items-center gap-1">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-orange-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-orange-500"></span>
                    </span>
                    Ініціалізація...
                </div>
            </div>
            <button onclick="toggleForm()" class="hidden md:block bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-xl font-bold transition-all shadow-lg shadow-indigo-200">
                + Додати об'єкт
            </button>
        </header>

        <!-- Мобільна кнопка -->
        <div class="fixed bottom-6 right-6 z-40 md:hidden">
            <button onclick="toggleForm()" class="h-14 w-14 bg-indigo-600 text-white rounded-full shadow-2xl flex items-center justify-center text-2xl font-bold">
                +
            </button>
        </div>

        <!-- Модальне вікно форми -->
        <div id="form-container" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-end md:items-center justify-center p-0 md:p-4">
            <div class="bg-white rounded-t-3xl md:rounded-2xl shadow-2xl w-full max-w-2xl p-6 overflow-y-auto max-h-[95vh] slide-up">
                <div class="flex justify-between items-center mb-6">
                    <h2 id="form-title" class="text-xl font-bold text-slate-800">Новий запис</h2>
                    <button onclick="toggleForm()" class="p-2 text-slate-400 hover:text-slate-600 bg-slate-100 rounded-full">✕</button>
                </div>
                
                <form id="wiki-form" class="space-y-4">
                    <input type="hidden" id="edit-id">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="space-y-1">
                            <label class="text-xs font-bold text-slate-400 uppercase ml-1">Назва</label>
                            <input type="text" id="name" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                        </div>
                        <div class="space-y-1">
                            <label class="text-xs font-bold text-slate-400 uppercase ml-1">Тип</label>
                            <select id="type" onchange="handleTypeChange()" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none cursor-pointer">
                                <option value="building">🏠 Будівля</option>
                                <option value="product">📦 Продукт</option>
                            </select>
                        </div>
                    </div>

                    <div id="product-only-fields" class="hidden animate-fade-in">
                        <div class="space-y-1">
                            <label class="text-xs font-bold text-slate-400 uppercase ml-1">Де виготовляється?</label>
                            <input list="buildings-datalist" id="produced-in" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl" placeholder="Назва будівлі...">
                            <datalist id="buildings-datalist"></datalist>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Рівень</label>
                            <input type="number" id="level" value="1" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">XP</label>
                            <input type="number" id="exp" value="0" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Монети</label>
                            <input type="number" id="coins" value="0" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Алмази</label>
                            <input type="number" id="diamonds" value="0" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="space-y-1">
                            <label class="text-xs font-bold text-slate-400 uppercase ml-1">Час виготовлення</label>
                            <input type="text" id="time" placeholder="30 хв" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl">
                        </div>
                        <div class="space-y-1">
                            <label class="text-xs font-bold text-slate-400 uppercase ml-1">Час (майстерність)</label>
                            <input type="text" id="time3stars" placeholder="20 хв" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl">
                        </div>
                    </div>

                    <div id="recipe-section" class="hidden space-y-3">
                        <label class="block text-xs font-bold text-slate-400 uppercase ml-1">Інгредієнти</label>
                        <div id="ingredients-list" class="space-y-2"></div>
                        <button type="button" onclick="addIngredientRow()" class="w-full py-3 border-2 border-dashed border-slate-200 rounded-xl text-indigo-600 text-sm font-bold hover:bg-indigo-50 transition-colors">
                            + Додати інгредієнт
                        </button>
                    </div>

                    <div class="pt-4">
                        <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all active:scale-95">
                            Зберегти запис
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Контент -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <section>
                <div class="flex items-center gap-2 mb-4">
                    <span class="text-xl">🏠</span>
                    <h2 class="text-lg font-bold text-slate-800 uppercase tracking-tight">Будівлі</h2>
                </div>
                <div id="buildings-list" class="space-y-4"></div>
            </section>
            <section>
                <div class="flex items-center gap-2 mb-4">
                    <span class="text-xl">📦</span>
                    <h2 class="text-lg font-bold text-slate-800 uppercase tracking-tight">Продукти</h2>
                </div>
                <div id="products-list" class="space-y-4"></div>
            </section>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, updateDoc, doc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Конфігурація з ваших скріншотів
        const firebaseConfig = {
            apiKey: "AIzaSyAdq60lkAvuPK7Z9yEipmcdWLVyZ6q-ys4",
            authDomain: "game-hayday-wiki.firebaseapp.com",
            projectId: "game-hayday-wiki",
            storageBucket: "game-hayday-wiki.firebasestorage.app",
            messagingSenderId: "404308051704",
            appId: "1:404308051704:web:2fcc9a2233455fadc79d0d",
            measurementId: "G-WRQXGBZFMF"
        };

        const appId = 'hayday-wiki-v3'; // Нова версія колекції
        let db, auth, entries = [];

        async function startApp() {
            try {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        updateStatus("Синхронізовано ✅", "text-emerald-600 bg-emerald-50");
                        setupCloudSync();
                    } else {
                        signInAnonymously(auth).catch(console.error);
                    }
                });
            } catch (e) {
                console.error(e);
                updateStatus("Помилка підключення ❌", "text-red-600 bg-red-50");
            }
        }

        function updateStatus(text, classes) {
            const el = document.getElementById('sync-status');
            el.innerText = text;
            el.className = `text-[10px] font-bold mt-1 px-2 py-1 rounded-full inline-flex items-center gap-1 ${classes}`;
        }

        function setupCloudSync() {
            // Шлях згідно з правилами безпеки
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'wiki');
            
            // Простий запит без складних фільтрів (згідно з RULE 2)
            onSnapshot(colRef, (snapshot) => {
                entries = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                renderUI();
            }, (err) => {
                console.error("Sync error:", err);
                updateStatus("Помилка доступу 🔒", "text-red-600 bg-red-50");
            });
        }

        function renderUI() {
            const bList = document.getElementById('buildings-list');
            const pList = document.getElementById('products-list');
            const bDatalist = document.getElementById('buildings-datalist');

            if (bList) bList.innerHTML = ''; 
            if (pList) pList.innerHTML = '';
            
            const buildings = entries.filter(e => e.type === 'building');
            const products = entries.filter(e => e.type === 'product');

            if(bDatalist) bDatalist.innerHTML = buildings.map(b => `<option value="${b.name}">`).join('');

            buildings.forEach(item => bList.appendChild(createItemCard(item)));
            products.forEach(item => pList.appendChild(createItemCard(item)));
        }

        function createItemCard(item) {
            const card = document.createElement('div');
            card.className = "card-gradient p-5 rounded-2xl border border-slate-200 shadow-sm slide-up relative overflow-hidden";
            
            let footer = '';
            if (item.type === 'product') {
                const ingredients = (item.ingredients || []).map(ing => 
                    `<span class="bg-indigo-50 text-indigo-600 text-[10px] font-bold px-2 py-1 rounded-lg border border-indigo-100">${ing.amount}× ${ing.name}</span>`
                ).join('');
                
                footer = `
                    <div class="mt-4 pt-3 border-t border-slate-100">
                        <div class="text-[10px] font-bold text-slate-400 uppercase mb-2">Рецепт:</div>
                        <div class="flex flex-wrap gap-1.5">${ingredients || '<span class="text-slate-300 italic">Без інгредієнтів</span>'}</div>
                        ${item.producedIn ? `<div class="mt-3 text-[10px] font-bold text-orange-600">🏠 Виготовляється в: ${item.producedIn}</div>` : ''}
                    </div>
                `;
            }

            card.innerHTML = `
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <h3 class="font-bold text-slate-800 text-lg">${item.name}</h3>
                        <span class="text-[9px] font-bold text-slate-300 uppercase">ID: ${item.id.slice(-4)}</span>
                    </div>
                    <div class="flex gap-1">
                        <button class="edit-btn p-2 text-indigo-400 hover:bg-indigo-50 rounded-lg transition-colors">✏️</button>
                        <button class="del-btn p-2 text-rose-400 hover:bg-rose-50 rounded-lg transition-colors">🗑️</button>
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-2 text-center">
                    <div class="bg-slate-50 p-2 rounded-xl">
                        <div class="text-[9px] font-bold text-slate-400 uppercase">Рівень</div>
                        <div class="text-sm font-bold text-slate-700">${item.level}</div>
                    </div>
                    <div class="bg-slate-50 p-2 rounded-xl">
                        <div class="text-[9px] font-bold text-slate-400 uppercase">XP</div>
                        <div class="text-sm font-bold text-indigo-600">+${item.exp}</div>
                    </div>
                    <div class="bg-slate-50 p-2 rounded-xl">
                        <div class="text-[9px] font-bold text-slate-400 uppercase">Ціна</div>
                        <div class="text-sm font-bold text-amber-600">${item.coins}💰</div>
                    </div>
                </div>
                <div class="mt-3 flex items-center gap-2 text-[11px] text-slate-500 font-medium">
                    <span class="bg-slate-100 px-2 py-0.5 rounded">⏱️ ${item.time || '—'}</span>
                    ${item.time3stars ? `<span class="bg-amber-50 text-amber-600 px-2 py-0.5 rounded">⭐ ${item.time3stars}</span>` : ''}
                </div>
                ${footer}
            `;

            card.querySelector('.edit-btn').onclick = () => editItem(item.id);
            card.querySelector('.del-btn').onclick = () => deleteItem(item.id);
            return card;
        }

        window.toggleForm = (isEdit = false) => {
            const container = document.getElementById('form-container');
            if (!isEdit) {
                document.getElementById('wiki-form').reset();
                document.getElementById('edit-id').value = '';
                document.getElementById('ingredients-list').innerHTML = '';
                document.getElementById('form-title').innerText = "Новий запис";
            }
            container.classList.toggle('hidden');
            handleTypeChange();
        };

        window.handleTypeChange = () => {
            const type = document.getElementById('type').value;
            document.getElementById('recipe-section').classList.toggle('hidden', type !== 'product');
            document.getElementById('product-only-fields').classList.toggle('hidden', type !== 'product');
        };

        window.addIngredientRow = (name = '', amount = 1) => {
            const list = document.getElementById('ingredients-list');
            const row = document.createElement('div');
            row.className = "flex gap-2 items-center animate-slide-up";
            row.innerHTML = `
                <input class="ing-name flex-1 p-2 bg-slate-50 border border-slate-200 rounded-lg text-sm" placeholder="Що..." value="${name}">
                <input type="number" class="ing-amount w-16 p-2 bg-slate-50 border border-slate-200 rounded-lg text-sm font-bold" value="${amount}">
                <button type="button" class="text-slate-300 hover:text-rose-500 p-2 remove-ing">✕</button>
            `;
            row.querySelector('.remove-ing').onclick = () => row.remove();
            list.appendChild(row);
        };

        async function editItem(id) {
            const item = entries.find(e => e.id === id);
            if (!item) return;
            document.getElementById('form-title').innerText = "Редагування";
            document.getElementById('edit-id').value = id;
            document.getElementById('name').value = item.name;
            document.getElementById('type').value = item.type;
            document.getElementById('level').value = item.level;
            document.getElementById('exp').value = item.exp;
            document.getElementById('coins').value = item.coins;
            document.getElementById('diamonds').value = item.diamonds;
            document.getElementById('time').value = item.time;
            document.getElementById('time3stars').value = item.time3stars || '';
            
            if (item.type === 'product') {
                document.getElementById('produced-in').value = item.producedIn || '';
                document.getElementById('ingredients-list').innerHTML = '';
                (item.ingredients || []).forEach(ing => addIngredientRow(ing.name, ing.amount));
            }
            window.toggleForm(true);
        }

        async function deleteItem(id) {
            if (confirm('Видалити цей об\'єкт?')) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'wiki', id));
            }
        }

        document.getElementById('wiki-form').onsubmit = async (e) => {
            e.preventDefault();
            const editId = document.getElementById('edit-id').value;
            const type = document.getElementById('type').value;
            
            const ingredients = [];
            if (type === 'product') {
                document.querySelectorAll('#ingredients-list > div').forEach(row => {
                    const n = row.querySelector('.ing-name').value;
                    const a = row.querySelector('.ing-amount').value;
                    if (n) ingredients.push({ name: n, amount: Number(a) });
                });
            }

            const data = {
                name: document.getElementById('name').value,
                type,
                level: Number(document.getElementById('level').value),
                exp: Number(document.getElementById('exp').value),
                coins: Number(document.getElementById('coins').value),
                diamonds: Number(document.getElementById('diamonds').value),
                time: document.getElementById('time').value,
                time3stars: document.getElementById('time3stars').value,
                producedIn: type === 'product' ? document.getElementById('produced-in').value : '',
                ingredients,
                updatedAt: serverTimestamp()
            };

            try {
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'wiki');
                if (editId) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'wiki', editId), data);
                } else {
                    await addDoc(colRef, data);
                }
                window.toggleForm();
            } catch (err) {
                console.error("Save error:", err);
                alert("Помилка збереження. Перевірте консоль.");
            }
        };

        startApp();
    </script>
</body>
</html>
