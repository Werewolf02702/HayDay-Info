<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Wiki - Local Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; 
            -webkit-tap-highlight-color: transparent;
        }
        .card-gradient { background: linear-gradient(135deg, #ffffff 0%, #f9fafb 100%); }
        .slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        input, select, textarea { font-size: 16px !important; }
        #form-container::-webkit-scrollbar { width: 4px; }
        #form-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="pb-24 md:pb-8 p-4 md:p-8">

    <div id="app" class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold text-slate-800">🎮 Game Wiki</h1>
                <p class="text-slate-500 text-sm">Локальна база (зберігається в браузері)</p>
                <div class="text-[10px] font-mono mt-1 text-green-600 bg-green-50 inline-block px-2 py-0.5 rounded">Offline Mode (LocalStorage)</div>
            </div>
            <button onclick="toggleForm()" class="hidden md:block bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-xl font-semibold transition-all shadow-lg shadow-blue-200">
                + Додати об'єкт
            </button>
        </header>

        <!-- Mobile Button -->
        <div class="fixed bottom-6 left-0 right-0 px-6 z-40 md:hidden">
            <button onclick="toggleForm()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-2xl shadow-blue-400 flex items-center justify-center gap-2 active:scale-95 transition-transform">
                <span class="text-xl">+</span> Новий запис
            </button>
        </div>

        <!-- Form Overlay -->
        <div id="form-container" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-end md:items-center justify-center p-0 md:p-4">
            <div class="bg-white rounded-t-3xl md:rounded-2xl shadow-2xl w-full max-w-2xl p-6 overflow-y-auto max-h-[92vh] slide-up">
                <div class="flex justify-between items-center mb-6">
                    <h2 id="form-title" class="text-xl font-bold text-slate-800">Новий запис</h2>
                    <button onclick="toggleForm()" class="p-2 text-slate-400 hover:text-slate-600 bg-slate-100 rounded-full">✕</button>
                </div>
                
                <form id="wiki-form" class="space-y-4">
                    <input type="hidden" id="edit-id">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1 ml-1">Назва</label>
                            <input type="text" id="name" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1 ml-1">Тип</label>
                            <select id="type" onchange="handleTypeChange()" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none appearance-none">
                                <option value="building">🏠 Будівля</option>
                                <option value="product">📦 Продукт</option>
                            </select>
                        </div>
                    </div>

                    <div id="product-only-fields" class="hidden space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1 ml-1">Де виготовляється? (Будівля)</label>
                            <input list="buildings-datalist" id="produced-in" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none" placeholder="Оберіть будівлю...">
                            <datalist id="buildings-datalist"></datalist>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Рівень</label>
                            <input type="number" id="level" value="1" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">XP</label>
                            <input type="number" id="exp" value="0" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Монети</label>
                            <input type="number" id="coins" value="0" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Алмази</label>
                            <input type="number" id="diamonds" value="0" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Час виготовлення</label>
                            <input type="text" id="time" placeholder="напр: 30 хв" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Час (3 зірки)</label>
                            <input type="text" id="time3stars" placeholder="напр: 20 хв" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl">
                        </div>
                    </div>

                    <div id="recipe-section" class="hidden space-y-3 pt-2">
                        <label class="block text-xs font-bold text-slate-500 uppercase">Рецепт (інгредієнти)</label>
                        <div id="ingredients-list" class="space-y-2"></div>
                        <button type="button" onclick="addIngredientRow()" class="w-full py-3 border-2 border-dashed border-slate-200 rounded-xl text-blue-600 text-sm font-bold">
                            + Додати інгредієнт
                        </button>
                    </div>

                    <div class="pt-4 flex gap-3">
                        <button type="button" onclick="toggleForm()" class="flex-1 py-4 bg-slate-100 text-slate-600 rounded-xl font-bold md:hidden">Скасувати</button>
                        <button type="submit" class="flex-[2] bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg">Зберегти</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Lists -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <section>
                <h2 class="text-lg font-bold text-slate-800 mb-4">🏠 Будівлі</h2>
                <div id="buildings-list" class="space-y-3"></div>
            </section>
            <section>
                <h2 class="text-lg font-bold text-slate-800 mb-4">📦 Продукти</h2>
                <div id="products-list" class="space-y-3"></div>
            </section>
        </div>
    </div>

    <script>
        // Ініціалізація даних з LocalStorage
        let entries = JSON.parse(localStorage.getItem('game_wiki_data')) || [];

        function saveData() {
            localStorage.setItem('game_wiki_data', JSON.stringify(entries));
            renderAll();
        }

        function renderAll() {
            const bList = document.getElementById('buildings-list');
            const pList = document.getElementById('products-list');
            const bDatalist = document.getElementById('buildings-datalist');

            bList.innerHTML = ''; 
            pList.innerHTML = '';
            
            const buildings = entries.filter(e => e.type === 'building');
            const products = entries.filter(e => e.type === 'product');

            // Оновлюємо список будівель для вибору в продуктах
            bDatalist.innerHTML = buildings.map(b => `<option value="${b.name}">`).join('');

            if (buildings.length === 0) bList.innerHTML = '<div class="p-8 text-center text-slate-400 bg-white rounded-2xl border border-dashed italic">Будівель ще немає</div>';
            if (products.length === 0) pList.innerHTML = '<div class="p-8 text-center text-slate-400 bg-white rounded-2xl border border-dashed italic">Продуктів ще немає</div>';

            buildings.forEach(item => bList.appendChild(createCard(item)));
            products.forEach(item => pList.appendChild(createCard(item)));
        }

        function createCard(item) {
            const div = document.createElement('div');
            div.className = "card-gradient p-5 rounded-2xl border border-slate-200 shadow-sm relative group mb-3 slide-up";
            
            let extra = '';
            if (item.type === 'product') {
                if (item.producedIn) extra += `<div class="mt-2 text-[11px] font-bold text-orange-600 bg-orange-50 px-2 py-1 rounded-lg inline-block">🏠 В: ${item.producedIn}</div>`;
                if (item.ingredients?.length) {
                    extra += `<div class="mt-3 pt-3 border-t border-slate-100 flex flex-wrap gap-1">
                        ${item.ingredients.map(ing => `<span class="bg-blue-50 text-blue-700 text-[10px] px-2 py-1 rounded-lg border border-blue-100">${ing.amount}× ${ing.name}</span>`).join('')}
                    </div>`;
                }
            } else {
                const prodInB = entries.filter(e => e.type === 'product' && e.producedIn === item.name);
                if (prodInB.length > 0) {
                    extra += `<div class="mt-3 pt-3 border-t border-slate-100 flex flex-wrap gap-1">
                        ${prodInB.map(p => `<span class="bg-green-50 text-green-700 text-[10px] px-2 py-1 rounded-lg border border-green-100">📦 ${p.name}</span>`).join('')}
                    </div>`;
                }
            }

            div.innerHTML = `
                <div class="flex justify-between items-start mb-2">
                    <h3 class="font-bold text-slate-800">${item.name}</h3>
                    <div class="flex gap-2">
                        <button onclick="editEntry('${item.id}')" class="text-blue-500 bg-blue-50 p-1.5 rounded-lg text-xs">✏️</button>
                        <button onclick="deleteEntry('${item.id}')" class="text-red-500 bg-red-50 p-1.5 rounded-lg text-xs">🗑️</button>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-1 text-[11px] text-slate-500">
                    <div>⭐ <b>${item.level}</b> рвн.</div>
                    <div>✨ <b>${item.exp}</b> XP</div>
                    <div>💰 <b>${item.coins}</b> мон.</div>
                    <div>💎 <b>${item.diamonds}</b> алм.</div>
                    <div class="col-span-2">⏱️ <b>${item.time}</b> (3⭐: ${item.time3stars || '-'})</div>
                </div>
                ${extra}
            `;
            return div;
        }

        function toggleForm(isEdit = false) {
            const container = document.getElementById('form-container');
            if (!isEdit) {
                document.getElementById('wiki-form').reset();
                document.getElementById('edit-id').value = '';
                document.getElementById('form-title').innerText = 'Новий запис';
                document.getElementById('ingredients-list').innerHTML = '';
            }
            container.classList.toggle('hidden');
            handleTypeChange();
        }

        function handleTypeChange() {
            const type = document.getElementById('type').value;
            document.getElementById('recipe-section').classList.toggle('hidden', type !== 'product');
            document.getElementById('product-only-fields').classList.toggle('hidden', type !== 'product');
        }

        function addIngredientRow(name = '', amount = 1) {
            const container = document.getElementById('ingredients-list');
            const row = document.createElement('div');
            row.className = "ingredient-row flex gap-2 items-center";
            const products = entries.filter(e => e.type === 'product').map(e => e.name);
            
            row.innerHTML = `
                <input list="prods-list" class="ing-select flex-1 p-2 bg-slate-50 border rounded-lg text-sm" placeholder="Що..." value="${name}">
                <datalist id="prods-list">${[...new Set(products)].map(p => `<option value="${p}">`).join('')}</datalist>
                <input type="number" class="ing-amount w-16 p-2 bg-slate-50 border rounded-lg text-sm font-bold" value="${amount}">
                <button type="button" onclick="this.parentElement.remove()" class="text-red-400 p-2">✕</button>
            `;
            container.appendChild(row);
        }

        function editEntry(id) {
            const item = entries.find(e => e.id === id);
            if (!item) return;
            document.getElementById('edit-id').value = id;
            document.getElementById('form-title').innerText = 'Редагувати';
            document.getElementById('name').value = item.name;
            document.getElementById('type').value = item.type;
            document.getElementById('level').value = item.level;
            document.getElementById('exp').value = item.exp;
            document.getElementById('coins').value = item.coins;
            document.getElementById('diamonds').value = item.diamonds;
            document.getElementById('time').value = item.time;
            document.getElementById('time3stars').value = item.time3stars || '';
            
            if (item.type === 'product') {
                document.getElementById('produced-in').value = item.producedIn || '';
                document.getElementById('ingredients-list').innerHTML = '';
                (item.ingredients || []).forEach(ing => addIngredientRow(ing.name, ing.amount));
            }
            toggleForm(true);
        }

        function deleteEntry(id) {
            if(confirm('Видалити?')) {
                entries = entries.filter(e => e.id !== id);
                saveData();
            }
        }

        document.getElementById('wiki-form').onsubmit = (e) => {
            e.preventDefault();
            const editId = document.getElementById('edit-id').value;
            const type = document.getElementById('type').value;
            
            const ingredients = [];
            if (type === 'product') {
                document.querySelectorAll('.ingredient-row').forEach(row => {
                    const name = row.querySelector('.ing-select').value;
                    const amount = row.querySelector('.ing-amount').value;
                    if(name) ingredients.push({ name, amount });
                });
            }

            const data = {
                id: editId || Date.now().toString(),
                name: document.getElementById('name').value,
                type: type,
                level: document.getElementById('level').value,
                exp: document.getElementById('exp').value,
                coins: document.getElementById('coins').value,
                diamonds: document.getElementById('diamonds').value,
                time: document.getElementById('time').value,
                time3stars: document.getElementById('time3stars').value,
                producedIn: type === 'product' ? document.getElementById('produced-in').value : '',
                ingredients: ingredients
            };

            if (editId) {
                const index = entries.findIndex(e => e.id === editId);
                entries[index] = data;
            } else {
                entries.push(data);
            }

            saveData();
            toggleForm();
        };

        // Запуск
        renderAll();
    </script>
</body>
</html>
