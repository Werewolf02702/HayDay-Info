<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Wiki - Cloud Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; 
            -webkit-tap-highlight-color: transparent;
        }
        .card-gradient { background: linear-gradient(135deg, #ffffff 0%, #f9fafb 100%); }
        .slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body class="pb-24 md:pb-8 p-4 md:p-8">

    <div id="app" class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold text-slate-800">🎮 HayDay Info</h1>
                <p class="text-slate-500 text-sm">Хмарна синхронізація активована 🚀</p>
                <div id="sync-status" class="text-[10px] font-mono mt-1 text-blue-600 bg-blue-50 inline-block px-2 py-0.5 rounded">Підключення...</div>
            </div>
            <button onclick="toggleForm()" class="hidden md:block bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-xl font-semibold transition-all shadow-lg shadow-blue-200">
                + Додати об'єкт
            </button>
        </header>

        <!-- Кнопка для мобільних пристроїв -->
        <div class="fixed bottom-6 left-0 right-0 px-6 z-40 md:hidden">
            <button onclick="toggleForm()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-2xl shadow-blue-400 flex items-center justify-center gap-2">
                <span class="text-xl">+</span> Новий запис
            </button>
        </div>

        <!-- Форма запису -->
        <div id="form-container" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-end md:items-center justify-center p-0 md:p-4">
            <div class="bg-white rounded-t-3xl md:rounded-2xl shadow-2xl w-full max-w-2xl p-6 overflow-y-auto max-h-[92vh] slide-up">
                <div class="flex justify-between items-center mb-6">
                    <h2 id="form-title" class="text-xl font-bold text-slate-800">Новий запис</h2>
                    <button onclick="toggleForm()" class="p-2 text-slate-400 hover:text-slate-600 bg-slate-100 rounded-full">✕</button>
                </div>
                
                <form id="wiki-form" class="space-y-4">
                    <input type="hidden" id="edit-id">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1 ml-1">Назва</label>
                            <input type="text" id="name" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1 ml-1">Тип</label>
                            <select id="type" onchange="handleTypeChange()" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                                <option value="building">🏠 Будівля</option>
                                <option value="product">📦 Продукт</option>
                            </select>
                        </div>
                    </div>

                    <div id="product-only-fields" class="hidden space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1 ml-1">Де виготовляється?</label>
                            <input list="buildings-datalist" id="produced-in" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl" placeholder="Оберіть будівлю...">
                            <datalist id="buildings-datalist"></datalist>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Рівень</label>
                            <input type="number" id="level" value="1" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">XP</label>
                            <input type="number" id="exp" value="0" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Монети</label>
                            <input type="number" id="coins" value="0" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Алмази</label>
                            <input type="number" id="diamonds" value="0" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Час виготовлення</label>
                            <input type="text" id="time" placeholder="напр: 30 хв" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Час (3 зірки)</label>
                            <input type="text" id="time3stars" placeholder="напр: 20 хв" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl">
                        </div>
                    </div>

                    <div id="recipe-section" class="hidden space-y-3">
                        <label class="block text-xs font-bold text-slate-500 uppercase">Інгредієнти</label>
                        <div id="ingredients-list" class="space-y-2"></div>
                        <button type="button" onclick="addIngredientRow()" class="w-full py-3 border-2 border-dashed border-slate-200 rounded-xl text-blue-600 text-sm font-bold">
                            + Додати інгредієнт
                        </button>
                    </div>

                    <div class="pt-4 flex gap-3">
                        <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg">Зберегти</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Списки об'єктів -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <section>
                <h2 class="text-lg font-bold text-slate-800 mb-4">🏠 Будівлі</h2>
                <div id="buildings-list" class="space-y-3"></div>
            </section>
            <section>
                <h2 class="text-lg font-bold text-slate-800 mb-4">📦 Продукти</h2>
                <div id="products-list" class="space-y-3"></div>
            </section>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, updateDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Твої дані з Firebase Console (вже вставлені)
        const firebaseConfig = {
            apiKey: "AIzaSyAdq60lkAvuPK7Z9yEipmcdWLVyZ6q-ys4",
            authDomain: "game-hayday-wiki.firebaseapp.com",
            projectId: "game-hayday-wiki",
            storageBucket: "game-hayday-wiki.firebasestorage.app",
            messagingSenderId: "404308051704",
            appId: "1:404308051704:web:2fcc9a2233455fadc79d0d",
            measurementId: "G-WRQXGBZFMF"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'hayday-wiki-v1';

        let entries = [];

        // Анонімний вхід для синхронізації
        signInAnonymously(auth).then(() => {
            document.getElementById('sync-status').innerText = "Підключено до хмари ☁️";
            setupListener();
        }).catch(err => {
            document.getElementById('sync-status').innerText = "Помилка доступу ❌";
            console.error(err);
        });

        function setupListener() {
            // Шлях до даних у Firestore
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'wiki');
            onSnapshot(colRef, (snapshot) => {
                entries = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                renderAll();
            }, (err) => {
                console.error("Firestore error:", err);
                if(err.code === 'permission-denied') {
                    document.getElementById('sync-status').innerText = "Перевірте Rules у Firebase 🔒";
                }
            });
        }

        function renderAll() {
            const bList = document.getElementById('buildings-list');
            const pList = document.getElementById('products-list');
            const bDatalist = document.getElementById('buildings-datalist');

            bList.innerHTML = ''; 
            pList.innerHTML = '';
            
            const buildings = entries.filter(e => e.type === 'building');
            const products = entries.filter(e => e.type === 'product');

            bDatalist.innerHTML = buildings.map(b => `<option value="${b.name}">`).join('');

            buildings.forEach(item => bList.appendChild(createCard(item)));
            products.forEach(item => pList.appendChild(createCard(item)));
        }

        function createCard(item) {
            const div = document.createElement('div');
            div.className = "card-gradient p-5 rounded-2xl border border-slate-200 shadow-sm mb-3 slide-up";
            
            let extra = '';
            if (item.type === 'product') {
                if (item.producedIn) extra += `<div class="mt-2 text-[11px] font-bold text-orange-600 bg-orange-50 px-2 py-1 rounded-lg inline-block">🏠 В: ${item.producedIn}</div>`;
                if (item.ingredients?.length) {
                    extra += `<div class="mt-3 pt-3 border-t border-slate-100 flex flex-wrap gap-1">${item.ingredients.map(ing => `<span class="bg-blue-50 text-blue-700 text-[10px] px-2 py-1 rounded-lg border border-blue-100">${ing.amount}× ${ing.name}</span>`).join('')}</div>`;
                }
            }

            div.innerHTML = `
                <div class="flex justify-between items-start mb-2">
                    <h3 class="font-bold text-slate-800">${item.name}</h3>
                    <div class="flex gap-2">
                        <button class="edit-btn text-blue-500 bg-blue-50 p-1.5 rounded-lg text-xs" data-id="${item.id}">✏️</button>
                        <button class="del-btn text-red-500 bg-red-50 p-1.5 rounded-lg text-xs" data-id="${item.id}">🗑️</button>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-1 text-[11px] text-slate-500">
                    <div>⭐ Рівень: ${item.level}</div>
                    <div>✨ XP: ${item.exp}</div>
                    <div>💰 Монети: ${item.coins}</div>
                    <div class="col-span-2">⏱️ Час: ${item.time}</div>
                </div>
                ${extra}
            `;

            div.querySelector('.edit-btn').onclick = () => editEntry(item.id);
            div.querySelector('.del-btn').onclick = () => deleteEntry(item.id);
            return div;
        }

        window.toggleForm = (isEdit = false) => {
            const container = document.getElementById('form-container');
            if (!isEdit) {
                document.getElementById('wiki-form').reset();
                document.getElementById('edit-id').value = '';
                document.getElementById('ingredients-list').innerHTML = '';
            }
            container.classList.toggle('hidden');
            handleTypeChange();
        };

        window.handleTypeChange = () => {
            const type = document.getElementById('type').value;
            document.getElementById('recipe-section').classList.toggle('hidden', type !== 'product');
            document.getElementById('product-only-fields').classList.toggle('hidden', type !== 'product');
        };

        window.addIngredientRow = (name = '', amount = 1) => {
            const container = document.getElementById('ingredients-list');
            const row = document.createElement('div');
            row.className = "ingredient-row flex gap-2 items-center";
            row.innerHTML = `
                <input class="ing-select flex-1 p-2 bg-slate-50 border rounded-lg text-sm" placeholder="Що..." value="${name}">
                <input type="number" class="ing-amount w-16 p-2 bg-slate-50 border rounded-lg text-sm font-bold" value="${amount}">
                <button type="button" class="text-red-400 p-2 remove-ing">✕</button>
            `;
            row.querySelector('.remove-ing').onclick = () => row.remove();
            container.appendChild(row);
        };

        async function editEntry(id) {
            const item = entries.find(e => e.id === id);
            if (!item) return;
            document.getElementById('edit-id').value = id;
            document.getElementById('name').value = item.name;
            document.getElementById('type').value = item.type;
            document.getElementById('level').value = item.level;
            document.getElementById('exp').value = item.exp;
            document.getElementById('coins').value = item.coins;
            document.getElementById('diamonds').value = item.diamonds;
            document.getElementById('time').value = item.time;
            document.getElementById('time3stars').value = item.time3stars || '';
            if (item.type === 'product') {
                document.getElementById('produced-in').value = item.producedIn || '';
                document.getElementById('ingredients-list').innerHTML = '';
                (item.ingredients || []).forEach(ing => addIngredientRow(ing.name, ing.amount));
            }
            window.toggleForm(true);
        }

        async function deleteEntry(id) {
            if(confirm('Видалити цей запис?')) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'wiki', id));
            }
        }

        document.getElementById('wiki-form').onsubmit = async (e) => {
            e.preventDefault();
            const editId = document.getElementById('edit-id').value;
            const type = document.getElementById('type').value;
            const ingredients = [];
            if (type === 'product') {
                document.querySelectorAll('.ingredient-row').forEach(row => {
                    const name = row.querySelector('.ing-select').value;
                    const amount = row.querySelector('.ing-amount').value;
                    if(name) ingredients.push({ name, amount: Number(amount) });
                });
            }

            const payload = {
                name: document.getElementById('name').value,
                type,
                level: Number(document.getElementById('level').value),
                exp: Number(document.getElementById('exp').value),
                coins: Number(document.getElementById('coins').value),
                diamonds: Number(document.getElementById('diamonds').value),
                time: document.getElementById('time').value,
                time3stars: document.getElementById('time3stars').value,
                producedIn: type === 'product' ? document.getElementById('produced-in').value : '',
                ingredients,
                updatedAt: serverTimestamp()
            };

            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'wiki');
            try {
                if (editId) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'wiki', editId), payload);
                } else {
                    await addDoc(colRef, payload);
                }
                window.toggleForm();
            } catch (err) {
                console.error("Save error:", err);
                alert("Помилка при збереженні. Перевірте правила Firestore!");
            }
        };
    </script>
</body>
</html>
